<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Himshim · Developer Portfolio</title>
<meta name="description" content="Open-source developer portfolio powered by GitHub API" />

<meta http-equiv="Content-Security-Policy"
  content="
  default-src 'self';
  img-src 'self' https://github.com https://avatars.githubusercontent.com;
  script-src 'self' 'unsafe-inline';
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src https://fonts.gstatic.com;
  connect-src https://api.github.com;
">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* ─── TOKENS ───────────────────────────────────────── */
:root {
  --bg:       #05080f;
  --surface:  #080d17;
  --card:     #0b1120;
  --border:   #141e32;
  --text:     #e8eef8;
  --muted:    #4a5f7a;
  --faint:    #1a2540;
  --accent:   #00e5ff;
  --accent2:  #6c4fff;
  --glow:     rgba(0,229,255,.18);
  --glow2:    rgba(108,79,255,.15);
  --grad:     linear-gradient(135deg,#00e5ff,#6c4fff);
  --font-head: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --r:        16px;
}
[data-theme="light"] {
  --bg:       #f0f4fc;
  --surface:  #ffffff;
  --card:     #ffffff;
  --border:   #d8e2f0;
  --text:     #0b1120;
  --muted:    #5b7494;
  --faint:    #e4ecf8;
  --glow:     rgba(0,229,255,.12);
  --glow2:    rgba(108,79,255,.10);
}

/* ─── RESET ────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family: var(--font-mono);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
img { display:block; }

/* ─── NOISE TEXTURE ────────────────────────────────── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size: 180px;
  opacity:.4;
}

/* ─── GRID LINES ───────────────────────────────────── */
.grid-lines {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 72px 72px;
  opacity:.25;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 0%, black 30%, transparent 90%);
}

/* ─── SCROLL FADE-IN ───────────────────────────────── */
.reveal {
  opacity:0;
  transform:translateY(26px);
  transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1);
}
.reveal.visible { opacity:1; transform:none; }

/* ─── LAYOUT ───────────────────────────────────────── */
.wrap { max-width:1120px; margin:auto; padding:0 24px; position:relative; z-index:1; }

/* ─── NAV ──────────────────────────────────────────── */
nav {
  position:sticky; top:0; z-index:100;
  border-bottom:1px solid var(--border);
}
nav::before {
  content:''; position:absolute; inset:0;
  background:rgba(5,8,15,.75);
  backdrop-filter:blur(20px) saturate(1.4);
  z-index:-1;
}
.nav-inner {
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 0;
}
.nav-brand {
  display:flex; gap:12px; align-items:center;
}
.nav-avatar {
  width:38px; height:38px; border-radius:10px;
  border:1px solid var(--border);
  transition:border-color .3s;
}
.nav-avatar:hover { border-color:var(--accent); }
.nav-label strong {
  font-family:var(--font-head);
  font-size:15px;
  display:block;
}
.nav-label span {
  font-size:11px;
  color:var(--muted);
  letter-spacing:.06em;
  text-transform:uppercase;
}
.nav-actions { display:flex; gap:8px; align-items:center; }

.btn {
  font-family:var(--font-mono);
  font-size:12px;
  font-weight:700;
  letter-spacing:.04em;
  padding:9px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
  cursor:pointer;
  transition:all .2s;
}
.btn:hover { background:var(--faint); border-color:var(--accent); }

.btn-grad {
  background:var(--grad);
  border:none; color:#fff;
  position:relative; overflow:hidden;
}
.btn-grad::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.18),transparent);
  opacity:0; transition:opacity .2s;
}
.btn-grad:hover { opacity:.9; }
.btn-grad:hover::after { opacity:1; }

/* ─── HERO ─────────────────────────────────────────── */
.hero {
  padding:88px 0 64px;
  position:relative;
}
.hero-glow {
  position:absolute;
  width:640px; height:400px;
  top:-80px; left:-160px;
  background:radial-gradient(ellipse at center, var(--glow) 0%, transparent 65%);
  pointer-events:none;
}
.hero-glow2 {
  position:absolute;
  width:480px; height:360px;
  top:0; right:-80px;
  background:radial-gradient(ellipse at center, var(--glow2) 0%, transparent 65%);
  pointer-events:none;
}
.hero-top {
  display:grid;
  grid-template-columns:auto 1fr;
  gap:28px;
  align-items:start;
}
.hero-img-wrap { position:relative; }
.hero-img {
  width:108px; height:108px;
  border-radius:20px;
  border:1px solid var(--border);
  object-fit:cover;
  transition:border-color .3s, box-shadow .3s;
}
.hero-img:hover {
  border-color:var(--accent);
  box-shadow:0 0 28px var(--glow);
}
.hero-status {
  position:absolute; bottom:-6px; right:-6px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  font-size:11px; padding:3px 8px;
  color:var(--accent); font-weight:700;
  letter-spacing:.04em;
  white-space:nowrap;
}
.hero-status::before {
  content:'';
  display:inline-block;
  width:6px; height:6px;
  border-radius:50%;
  background:var(--accent);
  margin-right:5px;
  animation:pulse 2s infinite;
}
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.5;transform:scale(.8)}
}

.hero-name {
  font-family:var(--font-head);
  font-size:clamp(38px,6vw,62px);
  font-weight:800;
  line-height:1.05;
  letter-spacing:-.03em;
  margin-bottom:10px;
}
.hero-name .accent-char { color:var(--accent); }

.hero-bio {
  font-size:14px;
  color:var(--muted);
  line-height:1.7;
  max-width:540px;
  margin-bottom:18px;
}

.hero-pills {
  display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px;
}
.pill {
  padding:5px 12px;
  border:1px solid var(--border);
  background:var(--faint);
  border-radius:999px;
  font-size:11px;
  letter-spacing:.04em;
  color:var(--muted);
  font-family:var(--font-mono);
  transition:border-color .2s,color .2s;
}
.pill:hover { border-color:var(--accent); color:var(--accent); }

.hero-social {
  display:flex; gap:10px; flex-wrap:wrap;
}
.social-btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:9px 14px;
  border:1px solid var(--border);
  border-radius:12px;
  background:rgba(255,255,255,.02);
  font-size:12px;
  font-family:var(--font-mono);
  font-weight:500;
  transition:all .2s;
}
.social-btn:hover {
  border-color:var(--accent);
  background:rgba(0,229,255,.04);
  color:var(--accent);
  transform:translateY(-2px);
}
.social-icon { font-size:15px; }

/* ─── DIVIDER ──────────────────────────────────────── */
.divider {
  display:flex; align-items:center; gap:14px;
  margin:52px 0 28px;
}
.divider-line {
  flex:1; height:1px; background:var(--border);
}
.divider-label {
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--muted);
}
.divider-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--accent);
}

/* ─── CARDS GRID ───────────────────────────────────── */
.cards-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:16px;
}

/* ─── PROJECT CARD ─────────────────────────────────── */
.pcard {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  position:relative;
  overflow:hidden;
  transition:border-color .25s, transform .25s, box-shadow .25s;
  cursor:default;
}
.pcard::before {
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(circle at 80% 0%, var(--glow) 0%, transparent 55%);
  opacity:0; transition:opacity .35s;
  pointer-events:none;
}
.pcard:hover {
  border-color:rgba(0,229,255,.35);
  transform:translateY(-4px);
  box-shadow:0 20px 48px rgba(0,0,0,.35);
}
.pcard:hover::before { opacity:1; }

.pcard-top {
  display:flex; justify-content:space-between; align-items:flex-start;
}
.pcard-icon {
  width:40px; height:40px;
  border-radius:11px;
  background:var(--faint);
  border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:18px;
  flex-shrink:0;
}
.pcard-links { display:flex; gap:6px; }
.pcard-link {
  padding:6px 11px;
  border-radius:9px;
  border:1px solid var(--border);
  font-size:11px;
  font-family:var(--font-mono);
  font-weight:700;
  letter-spacing:.04em;
  transition:all .2s;
  background:var(--faint);
}
.pcard-link.live {
  background:var(--grad); color:#fff; border:none;
}
.pcard-link:hover:not(.live) {
  border-color:var(--accent); color:var(--accent);
}
.pcard-link.live:hover { opacity:.85; }

.pcard-name {
  font-family:var(--font-head);
  font-size:17px;
  font-weight:700;
  letter-spacing:-.01em;
}
.pcard-desc {
  font-size:12.5px;
  color:var(--muted);
  line-height:1.65;
  flex:1;
}
.pcard-tags {
  display:flex; gap:6px; flex-wrap:wrap;
}
.tag {
  padding:4px 10px;
  border-radius:999px;
  border:1px solid var(--border);
  font-size:10.5px;
  letter-spacing:.04em;
  color:var(--muted);
  font-family:var(--font-mono);
  transition:all .2s;
}
.pcard:hover .tag {
  border-color:rgba(0,229,255,.2);
  color:rgba(0,229,255,.7);
}

.pcard-footer {
  display:flex; justify-content:space-between; align-items:center;
  margin-top:4px;
  padding-top:12px;
  border-top:1px solid var(--border);
  font-size:11px;
  color:var(--muted);
}
.stars { display:flex; align-items:center; gap:5px; }
.stars::before { content:'★'; color:gold; }

/* ─── REPO CARD (lighter variant) ─────────────────── */
.rcard {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:8px;
  transition:border-color .2s, transform .2s;
}
.rcard:hover {
  border-color:rgba(108,79,255,.4);
  transform:translateY(-3px);
}
.rcard-name {
  font-family:var(--font-head);
  font-size:15px;
  font-weight:700;
}
.rcard-desc {
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
  flex:1;
}
.rcard-footer {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:6px;
}
.lang-dot {
  display:inline-block;
  width:9px; height:9px;
  border-radius:50%;
  margin-right:5px;
  background:var(--accent);
}
.rcard-actions { display:flex; gap:6px; }
.rcard-btn {
  padding:5px 10px;
  border:1px solid var(--border);
  border-radius:8px;
  font-size:11px;
  font-family:var(--font-mono);
  font-weight:700;
  transition:all .2s;
}
.rcard-btn:hover { border-color:var(--accent2); color:var(--accent2); }

/* ─── LOAD MORE ────────────────────────────────────── */
.load-wrap { text-align:center; margin:28px 0; }
.load-btn {
  font-family:var(--font-mono);
  font-size:12px;
  font-weight:700;
  letter-spacing:.08em;
  padding:12px 28px;
  border-radius:12px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  transition:all .2s;
  text-transform:uppercase;
}
.load-btn:hover {
  border-color:var(--accent2);
  color:var(--accent2);
  background:rgba(108,79,255,.06);
}

/* ─── SKELETON ─────────────────────────────────────── */
.skeleton {
  border-radius:12px;
  background:var(--faint);
  animation:shimmer 1.6s infinite;
}
@keyframes shimmer {
  0%,100% { opacity:.5; }
  50% { opacity:1; }
}

/* ─── FOOTER ───────────────────────────────────────── */
.site-footer {
  border-top:1px solid var(--border);
  padding:32px 0;
  margin-top:64px;
  font-size:11.5px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
  position:relative; z-index:1;
}
.footer-left { display:flex; align-items:center; gap:10px; }
.footer-dot { width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite; }

/* ─── LANG COLOR MAP ───────────────────────────────── */
.lang-Python  { background:#3572A5; }
.lang-JavaScript { background:#f1e05a; }
.lang-TypeScript { background:#2b7489; }
.lang-HTML    { background:#e34c26; }
.lang-CSS     { background:#563d7c; }
.lang-Java    { background:#b07219; }
.lang-Go      { background:#00ADD8; }
.lang-Rust    { background:#dea584; }
.lang-C       { background:#555555; }
.lang-default { background:var(--accent2); }

/* ─── RESPONSIVE ───────────────────────────────────── */
@media (max-width:640px) {
  .hero-top { grid-template-columns:1fr; }
  .hero-img-wrap { display:none; }
  .nav-label span { display:none; }
}

/* ─── STAGGER ANIMATION DELAYS ─────────────────────── */
.stagger-1{transition-delay:.05s}
.stagger-2{transition-delay:.10s}
.stagger-3{transition-delay:.15s}
.stagger-4{transition-delay:.20s}
.stagger-5{transition-delay:.25s}
.stagger-6{transition-delay:.30s}
</style>
</head>

<body>

<div class="grid-lines" aria-hidden="true"></div>

<!-- ── NAV ───────────────────────────────────────────── -->
<nav>
  <div class="wrap">
    <div class="nav-inner">
      <div class="nav-brand">
        <img id="navAvatar" class="nav-avatar" alt="avatar" width="38" height="38">

<!-- ── HERO ───────────────────────────────────────────── -->
<main>

    <div class="hero-top reveal">

<!-- ── FEATURED ───────────────────────────────────────── -->

<!-- ── REPOS ──────────────────────────────────────────── -->
<section style="position:relative;z-index:1">
  <div class="wrap">
    <div class="divider reveal">
      <div class="divider-line"></div>
      <div class="divider-dot" style="background:var(--accent2)"></div>

<!-- ── FOOTER ─────────────────────────────────────────── -->
<footer class="site-footer">
  <div class="wrap" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;width:100%">
    <div class="footer-left">

<!-- ── SCRIPT ─────────────────────────────────────────── -->
<script>
const USER = "himshim";
const BATCH = 9;
let allRepos = [], offset = 0;

const FEATURED = [
  {
    title: "Pharmagraph Lab",
    desc: "Generate clean, publication-ready graphs from pharmacy instrument data exports.",
    repo: "https://github.com/himshim/Pharmagraph-lab",
    live: "https://pharmagraph-lab.vercel.app/",
    tags: ["Pharmacy","Graphs","Web"],
    icon: "⚗️"
  },
  {
    title: "Virtual Analytical Lab",
    desc: "Interactive simulations for analytical chemistry experiments — learn without breaking beakers.",
    repo: "https://github.com/himshim/virtual-analytical-lab",
    live: "https://himshim.github.io/virtual-analytical-lab/",
    tags: ["Simulation","Chemistry","Education"],
    icon: "🔬"
  }
];

/* ── helpers ─────────────────────────────────────────── */
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

function langClass(lang) {
  if (!lang) return "lang-default";
  const safe = lang.replace(/[^a-zA-Z]/g,"");
  return `lang-${safe}`;
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 3600) return Math.floor(diff/60)+"m ago";
  if (diff < 86400) return Math.floor(diff/3600)+"h ago";
  if (diff < 2592000) return Math.floor(diff/86400)+"d ago";
  if (diff < 31536000) return Math.floor(diff/2592000)+"mo ago";
  return Math.floor(diff/31536000)+"y ago";
}

/* ── featured card ───────────────────────────────────── */
function featuredCard(p, delay) {
  const d = document.createElement("div");
  d.className = "pcard reveal";
  d.style.transitionDelay = (delay*0.08)+"s";
  d.innerHTML = `
    <div class="pcard-top">
      <div class="pcard-icon">${p.icon || "📁"}</div>
      <div class="pcard-links">
        ${p.live ? `<a class="pcard-link live" href="${p.live}" target="_blank" rel="noopener">Live ↗</a>` : ""}
        <a class="pcard-link" href="${p.repo}" target="_blank" rel="noopener">Code</a>
      </div>
    </div>
    <div class="pcard-name">${p.title}</div>
    <div class="pcard-desc">${p.desc}</div>
    <div class="pcard-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
  `;
  return d;
}

/* ── repo card ───────────────────────────────────────── */
function repoCard(r, delay) {
  const d = document.createElement("div");
  d.className = "rcard reveal";
  d.style.transitionDelay = (delay*0.06)+"s";
  const lc = langClass(r.language);
  d.innerHTML = `
    <div class="rcard-name">${r.name}</div>
    <div class="rcard-desc">${r.description || "No description provided."}</div>
    <div class="rcard-footer">
      <span style="font-size:11px;color:var(--muted);display:flex;align-items:center;">
        <span class="lang-dot ${lc}"></span>${r.language || "Code"}
        ${r.stargazers_count ? ` &nbsp;·&nbsp; ★ ${r.stargazers_count}` : ""}
        &nbsp;·&nbsp; ${timeAgo(r.updated_at)}
      </span>
      <div class="rcard-actions">
        ${r.homepage ? `<a class="rcard-btn" href="${r.homepage}" target="_blank" rel="noopener">Live</a>` : ""}
        <a class="rcard-btn" href="${r.html_url}" target="_blank" rel="noopener">Code</a>
      </div>
    </div>
  `;
  return d;
}

/* ── render next batch of repos ──────────────────────── */
function renderBatch() {
  const container = $("#repos");
  const end = Math.min(offset + BATCH, allRepos.length);
  for (let i = offset; i < end; i++) {
    const card = repoCard(allRepos[i], i - offset);
    container.appendChild(card);
  }
  offset = end;
  observe();
  const btn = $("#loadMoreBtn");
  btn.style.display = offset < allRepos.length ? "inline-block" : "none";
}

/* ── scroll observer ─────────────────────────────────── */
function observe() {
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add("visible"); io.unobserve(e.target); }
    });
  }, { threshold: 0.08 });
  $$(".reveal").forEach(el => { if (!el.classList.contains("visible")) io.observe(el); });
}

/* ── skeleton ─────────────────────────────────────────── */
function addSkeletons(id, n, h) {
  const c = $(id);
  for (let i = 0; i < n; i++) {
    const s = document.createElement("div");
    s.className = "skeleton";
    s.style.height = h;
    c.appendChild(s);
  }
}

/* ── init ─────────────────────────────────────────────── */
async function init() {
  document.getElementById("footerYear").textContent = "© " + new Date().getFullYear() + " himshim";

  addSkeletons("#featured", 2, "180px");
  addSkeletons("#repos", 6, "140px");

  try {
    const user = await fetch(`https://api.github.com/users/${USER}`).then(r => r.json());

    // nav
    $("#navAvatar").src = `https://github.com/${USER}.png`;
    $("#navName").textContent = user.login;
    $("#githubBtn").href = user.html_url;

    // hero
    $("#heroAvatar").src = `https://github.com/${USER}.png`;
    $("#heroName").innerHTML = `<span class="accent-char">_</span>${user.name || user.login}`;
    $("#heroBio").textContent = user.bio || "Open-source developer building things for the web.";

    // pills
    const pillData = [
      { label: "👥 " + user.followers + " followers" },
      { label: "📦 " + user.public_repos + " repos" },
      user.location ? { label: "📍 " + user.location } : null,
      user.company  ? { label: "🏢 " + user.company } : null,
    ].filter(Boolean);
    pillData.forEach(p => {
      const el = document.createElement("span");
      el.className = "pill"; el.textContent = p.label;
      $("#heroPills").appendChild(el);
    });

    // featured
    $("#featured").innerHTML = "";
    FEATURED.forEach((p, i) => {
      const card = featuredCard(p, i);
      $("#featured").appendChild(card);
    });

    // repos
    const repos = await fetch(`https://api.github.com/users/${USER}/repos?per_page=100&sort=updated`)
      .then(r => r.json());
    allRepos = repos;
    $("#repos").innerHTML = "";
    renderBatch();

    observe();
  } catch (err) {
    console.error("GitHub API error:", err);
    $("#heroBio").textContent = "Failed to load profile. GitHub API may be rate-limited.";
  }
}

/* ── load more ─────────────────────────────────────────── */
$("#loadMoreBtn").onclick = () => { renderBatch(); };

/* ── theme toggle ─────────────────────────────────────── */
$("#themeBtn").onclick = () => {
  const root = document.documentElement;
  root.dataset.theme = root.dataset.theme === "dark" ? "light" : "dark";
};

/* ── hero typing cursor ───────────────────────────────── */
window.addEventListener("load", () => {
  const cursor = document.createElement("span");
  cursor.style.cssText = "display:inline-block;width:3px;height:.85em;background:var(--accent);vertical-align:-.05em;margin-left:2px;animation:pulse 1.1s infinite;border-radius:2px;";
  $("#heroName").appendChild(cursor);
});

init();
</script>
